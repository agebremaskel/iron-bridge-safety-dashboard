<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iron Bridge Operational Safety Intelligence</title>
  <style>
    :root {
      --ink:#001D44; --ink-2:#052b63; --text:#15171a; --muted:#5f6b77; --line:#d8e1ea; --green:#00FF00;
      --green-soft:#eaffea; --mid-green:#0CB94A; --red:#b4252d; --orange:#ff6b35; --page:#eef4fa; --white:#fff;
      --shadow:0 10px 24px rgba(0,29,68,.12);
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial, Roboto, Helvetica, sans-serif; color:var(--text); background:var(--page); }
    .topbar { height:42px; background:var(--ink); color:white; display:flex; align-items:center; justify-content:space-between; padding:0 18px; border-bottom:4px solid var(--green); }
    .brand { display:flex; align-items:center; gap:10px; font-weight:800; font-size:15px; }
    .beacon { width:26px; height:26px; border:7px solid var(--green); border-radius:999px; display:inline-block; }
    .topbar-meta { font-size:12px; opacity:.88; text-align:right; }
    .app-frame { display:grid; grid-template-columns:245px minmax(0,1fr); gap:18px; max-width:1960px; margin:0 auto; padding:18px 22px 42px; }
    .side-nav { position:sticky; top:58px; align-self:start; display:flex; flex-direction:column; gap:14px; }
    .side-panel, section, .metric, .date-card { background:rgba(255,255,255,.94); border:1px solid var(--line); box-shadow:var(--shadow); border-radius:8px; overflow:hidden; }
    .side-panel { padding:12px; }
    .side-title, h2 { margin:0; padding:10px 12px; background:linear-gradient(90deg,var(--ink),var(--ink-2)); color:white; font-weight:800; text-align:center; }
    .side-title { margin:-12px -12px 12px; font-size:14px; }
    .tabs { display:flex; flex-direction:column; gap:8px; }
    .tab { background:var(--ink); color:white; min-height:38px; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:800; border:1px solid #0b2c5d; cursor:pointer; border-radius:3px; }
    .tab.active { background:white; color:var(--ink); border:3px solid var(--ink); }
    header { min-height:150px; padding:24px 30px; color:white; background:radial-gradient(circle at 85% 12%, rgba(0,255,0,.16), transparent 24%), linear-gradient(90deg, rgba(0,29,68,.98), rgba(0,29,68,.82)), linear-gradient(135deg,#183f6b,#001D44 62%,#003F30); box-shadow:var(--shadow); border-radius:8px; }
    h1 { margin:8px 0; font-size:52px; line-height:1.05; color:white; }
    .label { font-size:12px; font-weight:800; color:var(--green); text-transform:uppercase; letter-spacing:.06em; }
    .subhead { margin:0; color:rgba(255,255,255,.88); font-size:16px; line-height:1.45; max-width:980px; }
    .main { display:grid; gap:16px; }
    .date-inputs { display:grid; gap:10px; }
    .control label { display:block; margin-bottom:6px; color:var(--muted); font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; }
    input, select, button { width:100%; min-height:40px; border:1px solid #c9ced4; background:white; color:var(--text); padding:8px 10px; font-size:14px; font-family:inherit; }
    button { background:var(--ink); color:white; font-weight:800; cursor:pointer; box-shadow:var(--shadow); }
    .range-wrap { display:grid; gap:8px; margin-top:10px; }
    .range-label { color:var(--muted); font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; }
    .range-track { position:relative; min-height:42px; display:flex; align-items:center; }
    input[type=range] { position:absolute; width:100%; margin:0; padding:0; min-height:42px; background:transparent; pointer-events:none; appearance:none; border:0; }
    input[type=range]::-webkit-slider-runnable-track { height:8px; background:var(--green-soft); border:1px solid #d9f7dc; }
    input[type=range]::-webkit-slider-thumb { appearance:none; width:34px; height:34px; border-radius:999px; border:4px solid var(--green-soft); background:white; margin-top:-14px; pointer-events:auto; box-shadow:0 1px 4px rgba(0,29,68,.18); }
    .preset-row { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-top:12px; }
    .preset { min-height:34px; padding:5px 6px; background:white; color:var(--text); border:2px solid #222; box-shadow:none; font-weight:400; }
    .preset.active { background:var(--ink); color:white; border-color:var(--ink); }
    .refresh { margin-top:12px; }
    .metrics { display:grid; grid-template-columns:repeat(6,minmax(145px,1fr)); gap:10px; align-items:start; }
    .metric { padding:0 12px 10px; min-height:92px; text-align:center; transition:transform .12s ease, box-shadow .12s ease; }
    .metric:hover { transform:translateY(-2px); box-shadow:0 14px 28px rgba(0,29,68,.16); }
    .metric .name { display:block; margin:0 -12px 9px; padding:7px 6px; color:white; background:var(--ink); font-size:12px; line-height:1.1; font-weight:800; }
    .metric.primary .name { background:var(--mid-green); }
    .metric.warn .name { background:var(--red); }
    .metric .value { margin-top:5px; font-size:36px; line-height:1; font-weight:800; color:var(--ink); }
    .metric.warn .value { color:var(--red); }
    .metric .note { margin-top:6px; color:var(--muted); font-size:11px; line-height:1.25; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .grid-3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:16px; }
    section { padding:0 16px 16px; }
    h2 { margin:0 -16px 14px; font-size:20px; }
    .panel { border:1px solid var(--line); background:linear-gradient(180deg,#fff,#f9fbfd); padding:14px; border-radius:6px; }
    .chart-title { color:var(--ink); font-weight:800; font-size:15px; margin:0 0 12px; }
    .bar-row { display:grid; grid-template-columns:170px 1fr 42px; gap:10px; align-items:center; margin:9px 0; min-height:22px; }
    .bar-label { font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:help; }
    .bar-track { height:13px; background:#eef1f3; border:1px solid #e1e5e8; }
    .bar-fill { height:100%; background:var(--green); }
    .bar-fill.orange { background:var(--orange); }
    .bar-value { font-size:12px; color:var(--muted); text-align:right; font-weight:800; }
    .kpi-tracker { display:grid; gap:12px; }
    .kpi-dept { border:1px solid var(--line); border-radius:6px; background:white; padding:12px; }
    .kpi-dept h3 { margin:0 0 10px; color:var(--ink); font-size:15px; }
    .kpi-list { display:grid; gap:8px; max-height:760px; overflow:auto; padding-right:4px; }
    .kpi-person-row { display:grid; grid-template-columns:minmax(260px,330px) 1fr; gap:14px; align-items:center; padding:10px; border:1px solid #e3ebf3; background:#fbfdff; border-radius:6px; }
    .kpi-person-name { color:var(--ink); font-size:14px; font-weight:900; line-height:1.2; }
    .kpi-person-role { margin-top:3px; color:var(--muted); font-size:11px; line-height:1.25; }
    .kpi-person-bars { display:grid; gap:7px; }
    .kpi-progress { display:grid; grid-template-columns:88px 1fr 54px; gap:8px; align-items:center; }
    .kpi-progress-label { color:var(--ink); font-size:11px; font-weight:900; text-transform:uppercase; }
    .kpi-progress-track { position:relative; height:18px; background:#eef1f3; border:1px solid #dbe4ec; border-radius:999px; overflow:hidden; }
    .kpi-progress-fill { height:100%; background:var(--green); border-radius:999px; }
    .kpi-progress-fill.coached { background:#1f74d8; }
    .kpi-progress-fill.short { background:var(--orange); }
    .kpi-progress-fill.low { background:var(--red); }
    .kpi-progress-value { color:var(--ink); font-size:12px; font-weight:900; text-align:right; }
    .kpi-month-breakdown { grid-column:1 / -1; display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
    .kpi-month-chip { border:1px solid var(--line); background:#f8fbff; padding:4px 6px; font-size:10px; line-height:1.2; color:var(--ink); }
    .kpi-month-chip.good { border-color:#bdeebf; background:var(--green-soft); }
    .kpi-month-chip.partial { border-color:#ffd0bf; background:#fff0ea; }
    .kpi-legend { display:flex; flex-wrap:wrap; gap:10px; align-items:center; color:var(--muted); font-size:12px; margin:6px 0 0; }
    .kpi-key { width:11px; height:11px; display:inline-block; margin-right:4px; border-radius:2px; background:var(--green); }
    .kpi-key.coached { background:#1f74d8; }
    .kpi-month-controls { display:grid; grid-template-columns:minmax(160px,220px) minmax(160px,220px) 1fr; gap:12px; align-items:end; margin:0 0 10px; }
    .kpi-month-note { color:var(--muted); font-size:12px; line-height:1.35; }
    .kpi-summary { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; margin-bottom:10px; }
    .kpi-summary .mini { border:1px solid var(--line); padding:8px; background:#f8fbff; }
    .table-controls { display:grid; grid-template-columns:1fr 190px; gap:10px; margin-bottom:10px; }
    .table-wrap { width:100%; overflow:auto; border:1px solid var(--line); max-height:720px; }
    table { width:100%; min-width:1320px; border-collapse:collapse; table-layout:fixed; font-size:12px; background:white; }
    th { position:sticky; top:0; z-index:1; background:var(--ink); color:white; text-align:left; padding:10px; padding-right:14px; vertical-align:top; }
    th button.sort-head, th button.filter-head { border:0; background:transparent; color:white; font:inherit; font-weight:800; padding:0; cursor:pointer; text-align:left; }
    th button.sort-head:hover, th button.filter-head:hover { text-decoration:underline; }
    th .head-stack { display:grid; gap:6px; }
    th .head-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    th .head-label { font-weight:800; }
    th input { width:100%; border:1px solid rgba(255,255,255,.35); padding:6px; font-size:11px; background:white; color:#1d2b3a; }
    .col-resizer { position:absolute; top:0; right:0; width:7px; height:100%; cursor:col-resize; user-select:none; }
    .col-resizer:hover { background:var(--green); }
    td { padding:9px 10px; border-top:1px solid var(--line); vertical-align:top; line-height:1.35; overflow-wrap:anywhere; }
    tr:nth-child(even) td { background:#f8f9fa; }
    tr:hover td { background:#f3fff3; }
    .badge { display:inline-block; padding:4px 8px; font-size:11px; font-weight:800; border:1px solid #bdeebf; background:var(--green-soft); color:#086b13; }
    .badge.warn { border-color:#ffd0bf; background:#fff0ea; color:#9b3716; }
    .muted { color:var(--muted); }
    .section { display:none; }
    .section.active { display:grid; gap:16px; }
    .insight-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:16px; }
    .insight { display:grid; grid-template-columns:230px minmax(0,1fr); gap:14px; align-items:center; }
    .donut { width:210px; height:210px; border-radius:50%; background:conic-gradient(var(--green) 0 100%); display:grid; place-items:center; margin:4px auto; }
    .donut::after { content:""; width:118px; height:118px; border-radius:50%; background:white; box-shadow:inset 0 0 0 1px var(--line); }
    .donut-center { position:absolute; text-align:center; color:var(--ink); font-weight:800; pointer-events:none; }
    .donut-wrap { position:relative; display:grid; place-items:center; min-height:220px; }
    .legend-row { display:grid; grid-template-columns:14px 1fr auto; gap:8px; align-items:center; margin:7px 0; font-size:12px; }
    .swatch { width:14px; height:14px; border-radius:2px; background:var(--green); }
    .body-focus { display:grid; grid-template-columns:190px minmax(0,1fr); gap:16px; align-items:center; margin-top:12px; padding:12px; border:1px solid var(--line); background:linear-gradient(180deg,#fbfdff,#eef7ff); border-radius:6px; }
    .body-map { width:176px; height:250px; margin:auto; filter:drop-shadow(0 8px 12px rgba(0,29,68,.15)); }
    .body-part { fill:#e8eef4; stroke:#cbd7e2; stroke-width:2; transition:opacity .12s ease; }
    .body-part.hot-low { fill:#ffd84d; }
    .body-part.hot-med { fill:#ff9f1c; }
    .body-part.hot-high { fill:#ff6b35; }
    .body-part.hot-alert { fill:#c6282f; }
    .body-uniform { fill:var(--ink); stroke:#001b40; stroke-width:2; }
    .body-ppe { fill:var(--green); stroke:#00b833; stroke-width:1.5; }
    .body-skin { fill:#d8a16b; stroke:#a56f40; stroke-width:1.5; }
    .body-boot { fill:#203247; stroke:#152131; stroke-width:1.5; }
    .body-list { display:grid; gap:8px; }
    .body-row { display:grid; grid-template-columns:112px 1fr 76px; gap:8px; align-items:center; font-size:12px; }
    .body-row .bar-track { height:10px; }
    .panel-controls { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:0 0 12px; align-items:end; }
    .mini-metrics { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin:10px 0; }
    .mini { border:1px solid var(--line); padding:8px; min-height:64px; background:#f8f9fa; }
    .mini strong { display:block; color:var(--ink); font-size:22px; }
    .mini span { color:var(--muted); font-size:12px; }
    .performance-card { padding-bottom:18px; }
    .performance-panel { padding:16px; background:linear-gradient(180deg,#ffffff,#f7fbff); }
    .performance-hero { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-bottom:14px; }
    .perf-metric { position:relative; min-height:132px; padding:16px; border:1px solid #d8e5f2; border-top:8px solid var(--green); background:linear-gradient(135deg,#ffffff 0%,#f7fbff 64%,#eaf4ff 100%); border-radius:6px; box-shadow:0 5px 14px rgba(0,29,68,.08); overflow:hidden; }
    .perf-metric::before { content:""; position:absolute; right:16px; top:18px; width:42px; height:42px; border:10px solid var(--green); border-radius:999px; opacity:.18; }
    .perf-metric::after { content:""; position:absolute; right:-34px; bottom:-44px; width:128px; height:128px; border-radius:999px; background:rgba(0,255,0,.08); }
    .perf-metric.rate { border-top-color:var(--ink); }
    .perf-metric.rate::before { border-color:var(--ink); }
    .perf-metric.rate::after { background:rgba(0,29,68,.08); }
    .perf-metric.lsi { border-top-color:var(--green); }
    .perf-metric.lsi::before { border-color:var(--green); }
    .perf-metric.lsi::after { background:rgba(0,255,0,.10); }
    .perf-kicker { color:var(--muted); font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.05em; }
    .perf-value { margin-top:8px; color:var(--ink); font-size:48px; line-height:1; font-weight:900; }
    .perf-label { margin-top:8px; color:var(--ink); font-size:16px; font-weight:900; }
    .perf-sub { margin-top:5px; color:var(--muted); font-size:12px; line-height:1.35; max-width:260px; }
    .performance-context { display:grid; grid-template-columns:1fr; gap:12px; }
    .perf-context-card { border:1px solid #d8e5f2; background:white; border-radius:6px; padding:12px; min-height:auto; }
    .perf-context-card h3 { margin:0 0 10px; color:var(--ink); font-size:14px; }
    .perf-list { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; }
    .perf-row { display:block; border-left:4px solid var(--green); background:#f8fbff; padding:8px 10px; color:var(--text); font-size:12px; min-height:52px; }
    .perf-row span { display:block; line-height:1.25; }
    .perf-row strong { display:block; margin-top:4px; color:var(--ink); font-size:18px; line-height:1; }
    .perf-chip-row { display:flex; flex-wrap:wrap; gap:6px; }
    .perf-chip { display:inline-flex; align-items:center; min-height:26px; padding:4px 8px; border:1px solid #cfe1f4; background:white; color:var(--ink); border-radius:999px; font-size:11px; font-weight:800; }
    .lsi-card { padding-bottom:18px; }
    .lsi-panel { border:1px solid var(--line); background:linear-gradient(180deg,#fff,#f8fbff); border-radius:6px; padding:14px; }
    .lsi-top { display:grid; grid-template-columns:220px 1fr; gap:14px; align-items:stretch; margin-bottom:12px; }
    .lsi-gauge { display:grid; place-items:center; min-height:170px; border:1px solid #d8e5f2; background:white; border-radius:6px; position:relative; overflow:hidden; }
    .lsi-gauge::after { content:""; position:absolute; right:-44px; bottom:-44px; width:130px; height:130px; border-radius:999px; background:rgba(0,255,0,.10); }
    .lsi-score { position:relative; z-index:1; color:var(--ink); font-size:54px; font-weight:900; line-height:1; }
    .lsi-score span { display:block; margin-top:8px; color:var(--muted); font-size:12px; font-weight:800; text-transform:uppercase; }
    .lsi-trend { border:1px solid #d8e5f2; background:white; border-radius:6px; padding:12px; }
    .lsi-months { display:flex; gap:7px; align-items:end; height:116px; margin-top:8px; border-bottom:1px solid var(--line); padding:0 4px 4px; }
    .lsi-month { flex:1; min-width:28px; display:grid; align-items:end; gap:4px; text-align:center; color:var(--muted); font-size:10px; }
    .lsi-month-bar { width:100%; min-height:5px; background:linear-gradient(180deg,var(--green),#0cb94a); border-radius:4px 4px 0 0; }
    .lsi-month.detractor .lsi-month-bar { background:linear-gradient(180deg,#ff6b35,#b4252d); }
    .lsi-breakdown { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
    .lsi-stack { border:1px solid #d8e5f2; border-radius:6px; background:white; padding:12px; }
    .lsi-stack h3 { margin:0 0 10px; color:var(--ink); font-size:15px; }
    .lsi-stack.promoter h3 { color:#008a18; }
    .lsi-stack.detractor h3 { color:var(--red); }
    .lsi-factor { display:grid; grid-template-columns:120px 1fr 52px; gap:8px; align-items:center; margin:8px 0; font-size:12px; }
    .lsi-factor label { color:var(--ink); font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .lsi-factor .bar-track { height:12px; }
    .lsi-factor.detractor .bar-fill { background:var(--red); }
    .lsi-factor small { color:var(--muted); font-weight:800; text-align:right; }
    .lsi-note { margin-top:10px; padding-left:10px; border-left:4px solid var(--green); color:var(--muted); font-size:12px; line-height:1.35; }
    .lsi-fy27 { margin-top:12px; border:1px solid #d8e5f2; background:#fbfdff; border-radius:6px; padding:12px; }
    .lsi-fy27 h3 { margin:0 0 10px; color:var(--ink); font-size:15px; }
    .lsi-fy27-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; }
    .lsi-change { border-left:4px solid var(--green); background:white; padding:9px 10px; min-height:98px; }
    .lsi-change.detractor { border-left-color:var(--red); }
    .lsi-change strong { display:block; color:var(--ink); font-size:12px; line-height:1.25; }
    .lsi-change span { display:inline-block; margin:5px 0 6px; padding:3px 6px; border-radius:999px; background:var(--green-soft); color:#087318; font-size:10px; font-weight:900; text-transform:uppercase; }
    .lsi-change.detractor span { background:#fff0ea; color:var(--red); }
    .lsi-change p { margin:0; color:var(--muted); font-size:11px; line-height:1.35; }
    .mini-select { display:flex; justify-content:space-between; align-items:center; gap:10px; margin:0 0 12px; }
    .mini-select label { font-size:11px; color:var(--muted); font-weight:800; text-transform:uppercase; }
    .mini-select select { min-width:155px; border:1px solid var(--line); padding:7px 9px; font-weight:800; color:var(--ink); background:white; }
    .inline-table { max-height:260px; overflow:auto; border:1px solid var(--line); margin-top:10px; border-radius:6px; }
    .inline-table.tall { max-height:520px; }
    .inline-table table { min-width:760px; }
    .itr-toolbar { display:grid; grid-template-columns:1fr 170px; gap:10px; align-items:end; margin-bottom:12px; }
    .itr-register-tools { display:grid; grid-template-columns:1fr 170px; gap:10px; align-items:end; margin:12px 0; }
    .itr-summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px; margin-bottom:14px; }
    .itr-summary section { box-shadow:none; padding:0 12px 12px; }
    .itr-summary h2 { font-size:15px; margin:0 -12px 10px; }
    .itr-summary .wide-card { grid-column:1 / -1; }
    .field-leadership-summary { grid-template-columns:repeat(3,minmax(0,1fr)); align-items:stretch; }
    .field-leadership-summary > section { min-width:0; }
    .actions-summary { grid-template-columns:repeat(4,minmax(0,1fr)); align-items:stretch; }
    .actions-summary > section { min-width:0; }
    .itr-subsection { margin-top:18px; }
    .itr-subsection-title { margin:0 0 10px; padding:10px 12px; color:white; background:var(--ink); font-weight:900; text-align:center; }
    .closed-controls { display:grid; grid-template-columns:1fr 1fr 180px; gap:10px; align-items:end; margin-bottom:12px; }
    .itr-register { display:grid; gap:12px; }
    .itr-card { border:1px solid var(--line); background:white; box-shadow:0 2px 10px rgba(0,31,63,.07); border-radius:8px; overflow:hidden; }
    details.itr-card > summary { list-style:none; cursor:pointer; }
    details.itr-card > summary::-webkit-details-marker { display:none; }
    .itr-card-head { display:grid; grid-template-columns:1fr auto; gap:12px; align-items:start; padding:12px 14px; background:#f8fbff; border-bottom:1px solid var(--line); }
    details.itr-card:not([open]) .itr-card-head { border-bottom:0; }

<body>
  <div class="topbar">
    <div class="brand"><span class="beacon" aria-hidden="true"></span><span>Fortescue</span></div>
    <div class="topbar-meta" id="topbarTitle">Iron Bridge Operational Safety Intelligence</div>
  </div>
  <div class="app-frame">
    <aside class="side-nav">

          <div class="control"><label for="endDate">End</label><input id="endDate" type="date" /></div>
        </div>

        </div>
        <div class="preset-row">
          <button class="preset" type="button" data-preset="custom">Custom</button>
          <button class="preset" type="button" data-preset="last24">Last 24h</button>
          <button class="preset active" type="button" data-preset="last7">Last 7d</button>
          <button class="preset" type="button" data-preset="mtd">MTD</button>
          <button class="preset" type="button" data-preset="ytd">YTD</button>
          <button class="preset" type="button" data-preset="qtd">QTD</button>
          <button class="preset" type="button" data-preset="fytd">FYTD</button>
        </div>
        <button id="refresh" class="refresh" type="button">Refresh</button>
      </div>
    </aside>
    <main class="main">
      <header>
        <div class="label">Safety Performance</div>
        <h1 id="dashboardTitle">Iron Bridge Operational Safety Intelligence</h1>
      </header>
      <div class="metrics" id="metrics"></div>
      <div id="sections"></div>
    </main>
  </div>
  <script type="module">
    async function fetchText(path) {
      const response = await fetch(path);
      if (!response.ok) throw new Error(`Unable to load ${path}: ${response.status}`);
      return response.text();
    }
    async function loadChunkedJson(paths) {
      const parts = await Promise.all(paths.map(fetchText));
      return JSON.parse(parts.join(""));
    }
    async function loadDashboardSnapshot() {
      const manifestResponse = await fetch("data/manifest.json");
      if (!manifestResponse.ok) throw new Error(`Unable to load dashboard manifest: ${manifestResponse.status}`);
      const manifest = await manifestResponse.json();
      const datasets = {};
      for (const [name, paths] of Object.entries(manifest.datasets)) {
        datasets[name] = await loadChunkedJson(paths);
      }
      return { ...manifest.snapshot, datasets };
    }
    const SNAPSHOT = await loadDashboardSnapshot();
    const DATA = SNAPSHOT.datasets;
    const SECTIONS = [
      ["summary", "Summary"],
      ["itrs", "ITRs"],
      ["incidents", "Incidents"],
      ["fieldLeadership", "Field Leadership"],
      ["actions", "Actions"],
      ["hazards", "Hazards"],
      ["inspections", "Workplace Inspections"],
      ["sources", "Source Coverage"]
    ];
    const DEPARTMENTS = ["All departments", ...(SNAPSHOT.scopeOptions || [
      "Iron Bridge CHF & West Canning Basin",
      "Iron Bridge OPF Maintenance",
      "Iron Bridge OPF Operations",
      "Iron Bridge OPF Shutdowns"
    ])];
    const DATE_FIELDS = {
      itrs: ["IdentifyRectify_DateIdentified", "IdentifyRectify_CompletionDate"],
      incidents: ["IncidentDate"],
      fieldLeadership: ["FieldLeadershipDate"],
      behaviours: ["FieldLeadershipDate"],
      actions: ["DateRaised", "DueDate"],
      hazards: ["HazardIdentificationDate", "HazardReportedDate"],
      inspections: ["InspectionDate", "CloseDate"],
      kpiDaily: ["Date"]
    };
    const state = {
      section:"summary",
      department: SNAPSHOT.scope || "Iron Bridge OPF Operations",
      departments:[SNAPSHOT.scope || "Iron Bridge OPF Operations"],
      startDate:null,
      endDate:null,
      startDateTime:null,
      endDateTime:null,
      preset:"last7",
      tableSearch:"",
      itrSearch:"",
      itrDateSort:"desc",
      sectionDateSort:{ incidents:"desc", fieldLeadership:"desc", actions:"asc", hazards:"desc", inspections:"desc" },
      itrClosedStartDate:null,
      itrClosedEndDate:null,
      leadershipCompletionSplit:"department",
      leadershipKpiMonth:null,
      leadershipKpiStartMonth:null,
      leadershipKpiEndMonth:null,
      lsiStartMonth:null,
      lsiEndMonth:null,
      actionFilters:{ Action_BK:"", DueDate:"", DaysUntilDue:"", ResponsibleName:"", Title:"", Criticality:"" },
      activeActionFilter:null,
      actionSort:{ field:null, dir:"asc" },
      quickFilters:{ incidents: { Incident_BK:"", IncidentDate:"", Status:"", IncidentClassification:"", WorkRelatedInjury:"", InjuryClassification:"", RiskRating:"", Consequence:"", IncidentLocation:"", BriefDescription:"" } },
      activeQuickFilter:null,
      quickColumnWidths:{ actions: {}, incidents: { BriefDescription:280 } },
      panels:{
        itrs: { startDate:null, endDate:null, split:"Assessment_Priority", chart:"donut" },
        incidents: { startDate:null, endDate:null, split:"IncidentClassification", chart:"donut" },
        leadership: { startDate:null, endDate:null, split:"Category", chart:"donut" },
        actions: { startDate:null, endDate:null, split:"DueBucket", chart:"donut" },
        hazards: { startDate:null, endDate:null, split:"RiskRating", chart:"donut" },
        inspections: { startDate:null, endDate:null, split:"QuestionnaireResult", chart:"donut" }
      }
    };

    function isSapId(value) { return /^0\d{5,9}$/.test(String(value ?? "").trim()); }
    function displayValue(value) { return isSapId(value) ? "Not recorded" : (value ?? ""); }
    function escapeHtml(value) { return String(displayValue(value)).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
    function safeUrl(value) {
      const text = String(value ?? "").trim();
      if (!text || /^blank$/i.test(text)) return "";
      try {
        const url = new URL(text);
        return /^https?:$/i.test(url.protocol) ? url.href : "";
      } catch (_) {
        return "";
      }
    }
    function recordLinkHtml(row, config) {
      const getter = config.linkUrl || (r => r.LinkToNewITR || r.LinkToLegacy);
      const url = safeUrl(typeof getter === "function" ? getter(row) : row[getter]);
      if (!url) return "";
      return `<a class="record-link" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">Open in BMS</a>`;
    }
    function toDate(value) { return new Date(`${value}T00:00:00`); }
    function isoDate(date) { const y=date.getFullYear(); const m=String(date.getMonth()+1).padStart(2,"0"); const d=String(date.getDate()).padStart(2,"0"); return `${y}-${m}-${d}`; }
    function addDays(value, days) { const d=toDate(value); d.setDate(d.getDate()+days); return isoDate(d); }
    function formatDataRefreshedAt(value) {
      if (!value) return "Not recorded";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString("en-AU", {
        day:"2-digit", month:"short", year:"numeric",
        hour:"numeric", minute:"2-digit", hour12:true
      });
    }
    function parseDateTime(value) {
      if (!value) return null;
      const text = String(value).trim();
      const normalised = text.includes("T") ? text : text.replace(" ", "T");
      const date = new Date(normalised.length <= 10 ? `${normalised}T00:00:00` : normalised);
      return Number.isNaN(date.getTime()) ? null : date;
    }
    function timeBucketHour(value) {
      const match = String(value || "").match(/^(\d{2})\d{2}/);
      return match ? Number(match[1]) : null;
    }
    function rowDate(row, fields) { for (const f of fields) { const v = row[f]; if (v) return String(v).slice(0,10); } return ""; }
    function rowDateTime(row, key) {
      const fields = DATE_FIELDS[key] || [];
      for (const f of fields) {
        const v = row[f];
        if (!v) continue;
        const text = String(v);
        const hasExplicitTime = /[T ]\d{2}:\d{2}/.test(text);
        const base = parseDateTime(v);
        if (!base) continue;
        if (hasExplicitTime) return base;
        const bucket = key === "fieldLeadership" || key === "behaviours" ? row.TimeOfDayConducted
          : key === "incidents" ? row.IncidentTimeofDay
          : null;
        const hour = timeBucketHour(bucket);
        if (hour !== null) base.setHours(hour, 0, 0, 0);
        return base;
      }
      return null;
    }
    function allDates() {
      const dates = [];
      Object.entries(DATE_FIELDS).forEach(([key, fields]) => (DATA[key] || []).forEach(row => { const d = rowDate(row, fields); if (d) dates.push(d); }));
      dates.sort();
      return dates;
    }
    const ALL_DATES = allDates();
    const MIN_DATE = ALL_DATES[0] || "2026-07-01";
    const MAX_DATE = ALL_DATES[ALL_DATES.length - 1] || "2026-07-09";
    function clampDate(value) { if (value < MIN_DATE) return MIN_DATE; if (value > MAX_DATE) return MAX_DATE; return value; }
    function dateOffset(value) { return Math.round((toDate(value) - toDate(MIN_DATE)) / 86400000); }
    const maxOffset = dateOffset(MAX_DATE);
    function rowDepartment(row) { return row.Tier05FullName || row.L5Name || row.ReportingDepartment || row.REPORTINGDEPARTMENT || ""; }
    function selectedDepartments() {
      const selected = state.departments && state.departments.length ? state.departments : [state.department || "Iron Bridge OPF Operations"];
      return selected.includes("All departments") ? DEPARTMENTS.filter(name => name !== "All departments") : selected;
    }
    function selectedDepartmentLabel() {
      const selected = state.departments && state.departments.length ? state.departments : [state.department || "Iron Bridge OPF Operations"];
      if (selected.includes("All departments")) return "All departments";
      if (selected.length === 1) return selected[0];
      return `${selected.length} departments selected`;
    }
    function departmentScoped(key, rows = DATA[key] || []) {
      if (key === "sources" || !state.department) return rows;
      const selected = selectedDepartments();
      if (!selected.length) return rows;
      const selectedSet = new Set(selected);
      return rows.filter(row => selectedSet.has(rowDepartment(row)));
    }
    function inRange(row, key) {
      if (state.preset === "last24" && state.startDateTime && state.endDateTime) {
        const dt = rowDateTime(row, key);
        return !dt || (dt >= state.startDateTime && dt <= state.endDateTime);
      }
      const d = rowDate(row, DATE_FIELDS[key] || []);
      return !d || (d >= state.startDate && d <= state.endDate);
    }
    function filtered(key, rows = DATA[key] || []) { return departmentScoped(key, rows).filter(row => inRange(row, key)); }
    function openItrs() { return filtered("itrs").filter(r => String(r.IdentifyRectify_CloseRecordFlag).toLowerCase() === "no"); }
    function closedItrs() { return filtered("itrs").filter(r => String(r.IdentifyRectify_CloseRecordFlag).toLowerCase() === "yes"); }
    function allItrs() { return filtered("itrs"); }
    function allOpenItrs() { return departmentScoped("itrs").filter(r => String(r.IdentifyRectify_CloseRecordFlag).toLowerCase() === "no"); }
    function allClosedItrs() { return departmentScoped("itrs").filter(r => String(r.IdentifyRectify_CloseRecordFlag).toLowerCase() === "yes"); }
    function openActions(rows = filtered("actions")) { return rows.filter(r => r.Status === "Open"); }
    function openHazards(rows = filtered("hazards")) { return rows.filter(r => r.Status === "Open"); }
    function atRiskBehaviours(rows = filtered("behaviours")) { return rows.filter(r => r.BehaviourType === "At Risk"); }
    function completedFieldLeadership(rows = filtered("fieldLeadership")) { return rows.filter(r => String(r.FieldLeadershipStatus || "").toLowerCase() === "closed"); }
    function isMediumHighHazard(row) {
      const rating = String(row.RiskRating || "").toUpperCase();
      return rating.includes("MEDIUM") || rating.includes("MODERATE") || rating.includes("HIGH");
    }
    function mediumHighHazards(rows = filtered("hazards")) { return rows.filter(isMediumHighHazard); }
    function nonCompliantInspections(rows = filtered("inspections")) {
      return rows.filter(r => {
        const result = String(r.QuestionnaireResult || "").toLowerCase();
        return (result.includes("not compliant") || result.includes("non compliant")) && !result.includes("partially");
      });
    }
    function completedInspections(rows = filtered("inspections")) {
      return rows.filter(r => {
        const complete = String(r["InspectionComplete?"] || "").toLowerCase();
        const closed = String(r.Closed || "").toLowerCase();
        return complete === "yes" || closed === "yes";
      });
    }
    function behaviourIdentifier(row) {
      const fullName = [row.FieldLeadershipCoachFirstName, row.FieldLeadershipCoachLastName].filter(Boolean).join(" ");
      return fullName || row.FieldLeadershipCoachName || "Not recorded";
    }
    function fieldLeadershipIdentifier(row) { return row.FieldLeadershipCoachFullName || "Not recorded"; }
    function fieldLeadershipLocation(row) {
      return row.FieldLeadershipLocationVisited
        || row.FieldLeadershipRefLocationVisited
        || row.FieldLeadershipHierarchyLocation
        || row.FieldLeadershipRefLocation
        || row.FieldLeadershipTier7LocationName
        || row.FieldLeadershipTier6LocationName
        || row.FieldLeadershipTier5LocationName
        || row.Tier07FullName
        || row.Tier06FullName
        || row.ReportingSite
        || "Not recorded";
    }
    function leadershipCompletionLabel(row) {
      if (state.leadershipCompletionSplit === "personnel") return fieldLeadershipIdentifier(row);
      if (state.leadershipCompletionSplit === "location") return fieldLeadershipLocation(row);
      return row.Tier05FullName || "Not recorded";
    }
    function leadershipCompletionControl() {
      return `<div class="mini-select"><label>Show completed FLs by</label><select data-leadership-completion-split>
        <option value="department" ${state.leadershipCompletionSplit === "department" ? "selected" : ""}>Department</option>
        <option value="personnel" ${state.leadershipCompletionSplit === "personnel" ? "selected" : ""}>Personnel</option>
        <option value="location" ${state.leadershipCompletionSplit === "location" ? "selected" : ""}>Location conducted</option>
      </select></div>`;
    }
    function hazardIdentifier(row) { return row.HazardReportedByName || row.HazardEnteredByName || row.HazardOwnerName || "Not recorded"; }
    function inspectionIdentifier(row) { return row.InspectionInspectedByName || row.InspectionClosedByName || row.InspectionAreaSuperintendentName || "Not recorded"; }
    function panelDate(row, panel) {
      const keyMap = { itrs:"itrs", incidents:"incidents", leadership:"fieldLeadership", actions:"actions", hazards:"hazards", inspections:"inspections" };
      return rowDate(row, DATE_FIELDS[keyMap[panel]] || []);
    }
    function panelInRange(row, panel, cfg) {
      const keyMap = { itrs:"itrs", incidents:"incidents", leadership:"behaviours", actions:"actions", hazards:"hazards", inspections:"inspections" };
      const key = keyMap[panel];
      if (state.preset === "last24" && state.startDateTime && state.endDateTime) {
        const dt = rowDateTime(row, key);
        return !dt || (dt >= state.startDateTime && dt <= state.endDateTime);
      }
      const d = panel === "leadership" ? rowDate(row, DATE_FIELDS.behaviours) : panelDate(row, panel);
      return !d || (d >= cfg.startDate && d <= cfg.endDate);
    }
    function panelRows(panel) {
      const cfg = state.panels[panel];
      const rows = panel === "itrs" ? departmentScoped("itrs").filter(r => String(r.IdentifyRectify_CloseRecordFlag).toLowerCase() === "no")
        : panel === "incidents" ? departmentScoped("incidents")
        : panel === "leadership" ? atRiskBehaviours(departmentScoped("behaviours"))
        : panel === "actions" ? openActions(departmentScoped("actions"))
        : panel === "hazards" ? mediumHighHazards(departmentScoped("hazards"))
        : panel === "inspections" ? completedInspections(departmentScoped("inspections"))
        : [];
      return rows.filter(row => panelInRange(row, panel, cfg));
    }
    function countBy(rows, field) {
      const m = new Map(); rows.forEach(r => { const k = r[field] || "Blank"; m.set(k, (m.get(k)||0)+1); });
      return [...m.entries()].sort((a,b)=>b[1]-a[1] || String(a[0]).localeCompare(String(b[0])));
    }
    function countByGetter(rows, getter) {
      const m = new Map();
      rows.forEach(row => {
        const raw = getter(row);
        const key = raw && String(raw).trim() ? String(raw).trim() : "Not recorded";
        m.set(key, (m.get(key) || 0) + 1);
      });
      return [...m.entries()].sort((a,b)=>b[1]-a[1] || String(a[0]).localeCompare(String(b[0])));
    }
    function normalisePersonName(value) {
      return String(value || "")
        .replace(/\s+/g, " ")
        .trim()
        .toUpperCase();
    }
    function isoMonth(date) {
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}`;
    }
    function availableLeadershipMonths() {

    function lsiContributionByMeasure(rows, rolling = false) {
      const byMeasure = new Map();
      rows.forEach(row => {
        const measure = cleanText(row.MEASURE) || "Not recorded";
        const current = byMeasure.get(measure) || { value:0, denominator:0, hours:0, target:0, weighting:0 };
        current.value += numValue(rolling ? row.MEASURE_VALUE_ROLLING_12_MONTHS : row.MEASURE_VALUE);
        current.denominator += numValue(rolling ? row.MEASURE_DENOMINATOR_ROLLING_12_MONTHS : row.MEASURE_DENOMINATOR);
        current.hours += numValue(rolling ? row.HOURS_ROLLING_12_MONTHS : row.HOURS);
        current.target = current.target || numValue(row.FREQUENCY_TARGET);
        current.weighting = current.weighting || numValue(row.WEIGHTING);
        byMeasure.set(measure, current);
      });
      return [...byMeasure.entries()].map(([measure, item]) => {
        const denominator = item.denominator || item.hours;
        const frequency = item.value && denominator ? (item.value / denominator) * 6350 : 0;
        const contribution = item.target && item.weighting ? (frequency / item.target) * item.weighting : 0;
        return { measure, label: lsiFriendlyMeasure(measure), category: lsiMeasureCategory(measure), kind: lsiMeasureKind(measure), contribution, value:item.value };
      }).filter(item => item.contribution > 0).sort((a,b) => b.contribution - a.contribution);
    }

    function renderActiveSection() {
      const container = document.getElementById("sections");

        container.innerHTML = `<div class="section active">${renderSummary()}</div>`;
        document.querySelectorAll("[data-panel-start]").forEach(input => input.addEventListener("change", event => {
          const panel = event.target.dataset.panelStart;
          state.panels[panel].startDate = clampDate(event.target.value);
          if (state.panels[panel].startDate > state.panels[panel].endDate) state.panels[panel].endDate = state.panels[panel].startDate;
          renderActiveSection();
        }));
        document.querySelectorAll("[data-panel-end]").forEach(input => input.addEventListener("change", event => {
          const panel = event.target.dataset.panelEnd;
          state.panels[panel].endDate = clampDate(event.target.value);
          if (state.panels[panel].endDate < state.panels[panel].startDate) state.panels[panel].startDate = state.panels[panel].endDate;
          renderActiveSection();
        }));
        document.querySelectorAll("[data-panel-split]").forEach(select => select.addEventListener("change", event => {
          state.panels[event.target.dataset.panelSplit].split = event.target.value;
          renderActiveSection();
        }));
        document.querySelectorAll("[data-quick-filter]").forEach(input => input.addEventListener("input", event => {
          const [group, field] = event.target.dataset.quickFilter.split(":");
          if (group === "actions") state.actionFilters[field] = event.target.value;
          else state.quickFilters[group][field] = event.target.value;
          state.activeQuickFilter = `${group}:${field}`;
          if (group === "actions") state.activeActionFilter = field;
          renderActiveSection();
          const next = document.querySelector(`[data-quick-filter="${group}:${field}"]`);
          if (next) {
            next.focus();
            next.setSelectionRange(next.value.length, next.value.length);
          }
        }));
        document.querySelectorAll("[data-quick-filter-toggle]").forEach(button => button.addEventListener("click", event => {
          const [group, field] = event.target.dataset.quickFilterToggle.split(":");
          const filters = group === "actions" ? state.actionFilters : state.quickFilters[group];
          const key = `${group}:${field}`;
          state.activeQuickFilter = state.activeQuickFilter === key && !filters[field] ? null : key;
          if (group === "actions") state.activeActionFilter = state.activeQuickFilter ? field : null;
          renderActiveSection();
          const next = document.querySelector(`[data-quick-filter="${group}:${field}"]`);
          if (next) next.focus();
        }));
        document.querySelectorAll("[data-action-sort]").forEach(button => button.addEventListener("click", event => {
          const field = event.target.dataset.actionSort;
          state.actionSort = {
            field,
            dir: state.actionSort.field === field && state.actionSort.dir === "asc" ? "desc" : "asc"
          };
          renderActiveSection();
        }));
        document.querySelectorAll("[data-column-resize]").forEach(handle => handle.addEventListener("mousedown", event => {
          event.preventDefault();
          event.stopPropagation();
          const [group, field] = event.target.dataset.columnResize.split(":");
          const col = document.querySelector(`col[data-col-field="${group}:${field}"]`);
          if (!col) return;
          const startX = event.clientX;
          const startWidth = Number.parseFloat(col.style.width) || 120;
          const onMove = moveEvent => {
            const width = Math.max(70, startWidth + moveEvent.clientX - startX);
            col.style.width = `${width}px`;
            if (!state.quickColumnWidths[group]) state.quickColumnWidths[group] = {};
            state.quickColumnWidths[group][field] = Math.round(width);
          };
          const onUp = () => {
            document.removeEventListener("mousemove", onMove);
            document.removeEventListener("mouseup", onUp);
          };
          document.addEventListener("mousemove", onMove);
          document.addEventListener("mouseup", onUp);
        }));
      } else if (state.section === "itrs") {

      if (name === "All departments") return "All Departments";
      return String(name || "").replace(/^Iron Bridge\s*/i, "").trim() || "OPF Operations";
    }
    function combinedDepartmentShortName() {
      const selected = state.departments && state.departments.length ? state.departments : [state.department || "Iron Bridge OPF Operations"];
      if (selected.includes("All departments")) return "All Departments";
      if (selected.length === 1) return departmentShortName(selected[0]);
      return `${selected.length} Departments`;
    }
    function renderDepartments() {
      const selected = state.departments && state.departments.length ? state.departments : [state.department || "Iron Bridge OPF Operations"];
      const selectedSet = new Set(selected);
      document.getElementById("departmentList").innerHTML = DEPARTMENTS.map(name => `
        <button type="button" class="department-button ${selectedSet.has(name) ? "active" : ""}" data-department="${escapeHtml(name)}" title="Click to select one department. Ctrl+click to combine departments.">
          ${escapeHtml(name === "All departments" ? name : name.replace(/^Iron Bridge\s*/i, ""))}
        </button>`).join("");
      document.querySelectorAll(".department-list .department-button").forEach(button => button.addEventListener("click", event => {
        const name = button.dataset.department;
        const multi = event.ctrlKey || event.metaKey;
        if (name === "All departments" || !multi) {
          state.departments = [name];
        } else {
          const next = new Set((state.departments || []).filter(item => item !== "All departments"));
          if (next.has(name)) next.delete(name);
          else next.add(name);
          state.departments = next.size ? [...next] : [name];
        }
        state.department = state.departments[0];
        state.tableSearch = "";
        state.itrSearch = "";
        render();
      }));
      const shortName = combinedDepartmentShortName();
      document.getElementById("dashboardTitle").textContent = "Iron Bridge Operational Safety Intelligence";
      document.getElementById("topbarTitle").textContent = selected.includes("All departments") ? "All Departments" : `${shortName}`;
    }
    function syncDateControls() {
      document.getElementById("startDate").min = MIN_DATE; document.getElementById("startDate").max = MAX_DATE;
      document.getElementById("endDate").min = MIN_DATE; document.getElementById("endDate").max = MAX_DATE;
      document.getElementById("startDate").value = state.startDate; document.getElementById("endDate").value = state.endDate;
      document.getElementById("startRange").max = maxOffset; document.getElementById("endRange").max = maxOffset;
      document.getElementById("startRange").value = dateOffset(state.startDate); document.getElementById("endRange").value = dateOffset(state.endDate);
      document.querySelectorAll(".preset").forEach(button => button.classList.toggle("active", button.dataset.preset === state.preset));
    }
    function refreshedAtDate() {
      return parseDateTime(SNAPSHOT.generatedAt) || toDate(MAX_DATE);
    }
    function setDateRange(start, end, preset="custom") {
      let s = clampDate(start), e = clampDate(end); if (s > e) [s,e] = [e,s];
      state.startDate = s; state.endDate = e; state.preset = preset;
      if (preset === "last24") {
        const endTime = refreshedAtDate();
        const startTime = new Date(endTime.getTime() - 24 * 60 * 60 * 1000);
        state.startDateTime = startTime;
        state.endDateTime = endTime;
        state.startDate = clampDate(isoDate(startTime));
        state.endDate = clampDate(isoDate(endTime));
        s = state.startDate;
        e = state.endDate;
      } else {
        state.startDateTime = null;
        state.endDateTime = null;
      }
      Object.keys(state.panels).forEach(panel => { state.panels[panel].startDate = s; state.panels[panel].endDate = e; });
      syncDateControls(); render();
    }
    function presetRange(preset) {
      const end = preset === "last24" ? clampDate(isoDate(refreshedAtDate())) : MAX_DATE;
      const endDate = toDate(end);
      if (preset === "last24") return [clampDate(isoDate(new Date(refreshedAtDate().getTime() - 24 * 60 * 60 * 1000))), end];
      if (preset === "last7") return [addDays(end,-6),end];
      if (preset === "mtd") return [isoDate(new Date(endDate.getFullYear(), endDate.getMonth(), 1)), end];
      if (preset === "ytd") return [isoDate(new Date(endDate.getFullYear(), 0, 1)), end];
      if (preset === "qtd") return [isoDate(new Date(endDate.getFullYear(), Math.floor(endDate.getMonth()/3)*3, 1)), end];
      if (preset === "fytd") return [isoDate(new Date(endDate.getMonth() >= 6 ? endDate.getFullYear() : endDate.getFullYear()-1, 6, 1)), end];
      return [state.startDate, state.endDate];
    }
    function render() {
      document.getElementById("dataRefreshedAt").textContent = formatDataRefreshedAt(SNAPSHOT.generatedAt);
      renderTabs(); renderDepartments(); renderMetrics(); renderActiveSection();
      applyTextTooltips();
    }
    document.getElementById("startDate").addEventListener("change", e => setDateRange(e.target.value, state.endDate));
    document.getElementById("endDate").addEventListener("change", e => setDateRange(state.startDate, e.target.value));
    document.getElementById("startRange").addEventListener("input", e => setDateRange(addDays(MIN_DATE, Number(e.target.value)), state.endDate));
    document.getElementById("endRange").addEventListener("input", e => setDateRange(state.startDate, addDays(MIN_DATE, Number(e.target.value))));
    document.querySelectorAll(".preset").forEach(button => button.addEventListener("click", () => setDateRange(...presetRange(button.dataset.preset), button.dataset.preset)));
    document.getElementById("refresh").addEventListener("click", () => window.location.reload());
    setDateRange(...presetRange("last7"), "last7");
  </script>
  <noscript>This dashboard needs JavaScript enabled to load the GitHub Pages data files.</noscript>
</body>
